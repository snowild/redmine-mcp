# Docker Compose example configuration
# Usage: docker compose up -d

services:
  redmine-mcp:
    build: .
    container_name: redmine-mcp
    ports:
      - "8000:8000"
    environment:
      # Required configuration - please update with your Redmine settings
      - REDMINE_DOMAIN=https://your-redmine-domain.com
      - REDMINE_API_KEY=your_api_key_here
      # Optional configuration
      - REDMINE_MCP_PORT=8000
      - REDMINE_MCP_HOST=0.0.0.0
      - REDMINE_MCP_LOG_LEVEL=INFO
      - REDMINE_MCP_TIMEOUT=30
    volumes:
      # Mount user profiles file (optional, for multi-user support)
      - ./users.json:/home/mcp/.redmine_mcp/users.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/sse", "--max-time", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

# Example using .env file (recommended):
# 1. Create .env file:
#    REDMINE_DOMAIN=https://your-redmine-domain.com
#    REDMINE_API_KEY=your_api_key_here
#
# 2. Modify docker-compose.yml:
#    environment:
#      - REDMINE_DOMAIN=${REDMINE_DOMAIN}
#      - REDMINE_API_KEY=${REDMINE_API_KEY}
